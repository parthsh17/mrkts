name: CD — Deploy Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/cd-backend.yml"

jobs:
  deploy-backend:
    name: Deploy to Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Render auto-deploys when connected to GitHub.
      # This step triggers a manual deploy via Render's Deploy Hook URL.
      # Steps to get your deploy hook:
      #   1. Go to your Render service → Settings → Deploy Hook
      #   2. Copy the URL and add it as GitHub Secret: RENDER_DEPLOY_HOOK_URL
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"

      - name: Deployment triggered
        run: echo "✅ Render deployment triggered. Monitor at https://dashboard.render.com"
